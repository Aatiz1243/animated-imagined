<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Animated Imagined (AI) — Video Builder</title>
<script src="https://js.puter.com/v2/"></script>
<style>
  :root {
    --bg: #0c0e0d;
    --panel: #141815;
    --amber: #ffb238;
    --teal: #52d6c8;
    --text: #e9e5d8;
    --dim: #8b9088;
    --border: #262b27;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, "Cascadia Code", "JetBrains Mono", Consolas, monospace;
    padding: 22px 16px 70px;
    max-width: 560px;
    margin: 0 auto;
    line-height: 1.5;
  }
  .eyebrow { color: var(--teal); font-size: 12px; letter-spacing: 0.14em; font-weight: 700; }
  h1 { font-size: 24px; margin: 6px 0 4px; }
  .sub { color: var(--dim); font-size: 13px; margin: 0 0 18px; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 14px;
  }
  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--dim);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 11px 10px;
    border-radius: 4px;
  }
  .ghost-btn {
    margin-top: 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--teal);
    padding: 9px 12px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
  }
  .ghost-btn:disabled { opacity: 0.5; }
  .primary-btn {
    width: 100%;
    background: var(--amber);
    color: #16130a;
    border: none;
    padding: 15px;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.06em;
    border-radius: 6px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .primary-btn:disabled { opacity: 0.5; }
  .status { margin-top: 14px; font-size: 13px; color: var(--amber); min-height: 18px; }
  .log {
    margin-top: 8px;
    font-size: 11px;
    color: var(--dim);
    max-height: 140px;
    overflow-y: auto;
    border-left: 2px solid var(--border);
    padding-left: 10px;
  }
  .log-line { padding: 2px 0; }
  .scenes { margin-top: 18px; display: flex; flex-direction: column; gap: 12px; }
  .scene-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
  }
  .scene-label {
    color: var(--teal);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .scene-card img { width: 100%; border-radius: 4px; display: block; }
  .scene-text { font-size: 12.5px; margin: 8px 0; }
  .scene-card audio { width: 100%; height: 32px; }
  footer { margin-top: 18px; font-size: 11px; color: var(--dim); }
  footer p { margin: 4px 0; }
  footer span { color: var(--text); }
</style>
</head>
<body>
  <div class="eyebrow">ANIMATED IMAGINED (AI)</div>
  <h1>Video Builder</h1>
  <p class="sub">Topic in, script and scenes out. No API key, no laptop.</p>

  <section class="panel">
    <label for="topic">Topic</label>
    <input type="text" id="topic" placeholder="How the 1964 World's Fair imagined 2026" />
    <button id="surpriseBtn" class="ghost-btn" type="button">Surprise me</button>
  </section>

  <button id="generateBtn" class="primary-btn" type="button">Generate</button>

  <div id="status" class="status"></div>
  <div id="log" class="log"></div>
  <button id="copyLogBtn" class="ghost-btn" type="button">Copy details</button>
  <div id="scenes" class="scenes"></div>

  <footer>
    <p>Title: <span id="videoTitle"></span></p>
    <p>Tags: <span id="videoTags"></span></p>
  </footer>

<script>
const SEED_TOPICS = [
  "How the 1964 World's Fair imagined 2026",
  "The Concorde's imagined successor that never flew",
  "Pan Am's imagined 1980s Mars tourism ads",
  "The imagined arcologies of 1970s architecture magazines",
  "1950s imagined kitchens of the year 2000",
  "The atomic age's imagined flying commuter cars",
  "1960s imagined underwater cities that were never built",
  "Imagined videophone ads from 1930s World's Fairs",
  "The imagined robot butlers of 1962 Popular Mechanics covers",
  "1980s imagined cyberpunk Tokyo that never fully arrived",
  "The imagined domed cities of 1950s civil defense pamphlets",
  "Imagined personal jetpacks promised by 1960s ad campaigns",
];

const TREND_SUBREDDITS = [
  "RetroFuturism",
  "ImaginaryTechnology",
  "AlternateHistory",
  "ImaginaryCityscapes",
];

function log(message) {
  const el = document.getElementById("log");
  const line = document.createElement("div");
  line.className = "log-line";
  line.textContent = message;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setStatus(text) {
  document.getElementById("status").textContent = text;
}

function randomFrom(list) {
  return list[Math.floor(Math.random() * list.length)];
}

async function fetchTrendingTopic() {
  const sub = randomFrom(TREND_SUBREDDITS);
  try {
    const res = await fetch(
      "https://www.reddit.com/r/" + sub + "/top.json?t=week&limit=15"
    );
    if (!res.ok) return null;
    const data = await res.json();
    const posts = (data.data.children || [])
      .map((p) => p.data)
      .filter((p) => p && p.title && !p.stickied);
    if (posts.length === 0) return null;
    const post = randomFrom(posts);
    return post.title + " (from r/" + sub + ")";
  } catch (err) {
    return null;
  }
}

async function pickSeedTopic() {
  const btn = document.getElementById("surpriseBtn");
  btn.disabled = true;
  btn.textContent = "Finding a topic...";
  let topic = null;
  try {
    topic = await fetchTrendingTopic();
  } catch (err) {
    topic = null;
  }
  document.getElementById("topic").value = topic || randomFrom(SEED_TOPICS);
  btn.disabled = false;
  btn.textContent = "Surprise me";
}

function scriptPrompt(topic) {
  return [
    'Write a YouTube Shorts script for a channel called "Animated Imagined (AI)"',
    'about this imagined concept: "' + topic + '".',
    "The channel shows AI-generated imagined visuals of things that never existed:",
    "retrofuturism, alternate history, lost inventions, imagined cities.",
    "Style: vivid, cinematic, spoken narration, no stage directions, no emojis.",
    "Break it into exactly 4 scenes, 20 to 30 words of narration each, building",
    "to a payoff in the last scene. For each scene write an image generation",
    "prompt for the single visual: vivid, concrete, cinematic lighting, detailed",
    "illustration, retrofuturistic art style, no text or words in the image.",
    "Return ONLY valid JSON, no markdown fences, no commentary, in exactly this shape:",
    '{"title": "string under 60 chars", "tags": ["tag1","tag2","tag3","tag4","tag5"],',
    '"scenes": [{"narration": "string", "image_prompt": "string"}, ... exactly 4 items]}',
  ].join(" ");
}

function describeError(err) {
  if (!err) return "Unknown error";
  if (typeof err === "string") return err;
  const parts = [];
  if (err.message) parts.push(err.message);
  if (err.error) {
    if (typeof err.error === "string") parts.push(err.error);
    else if (err.error.message) parts.push(err.error.message);
  }
  if (parts.length === 0) {
    try {
      parts.push(JSON.stringify(err));
    } catch (e) {
      parts.push(String(err));
    }
  }
  return parts.join(" | ");
}

function extractChatText(response) {
  if (typeof response === "string") return response;
  if (response && response.message && response.message.content) {
    const content = response.message.content;
    if (typeof content === "string") return content;
    if (Array.isArray(content)) {
      const block = content.find((b) => b && (b.text || b.type === "text"));
      if (block && block.text) return block.text;
    }
  }
  if (response && response.text) return response.text;
  return String(response);
}

async function generateScript(topic) {
  const response = await puter.ai.chat(scriptPrompt(topic), {
    model: "claude-sonnet-4-6",
  });
  const raw = extractChatText(response);
  const cleaned = raw.replace(/```json|```/g, "").trim();
  return JSON.parse(cleaned);
}

function toAudioElement(result) {
  if (result && result.tagName === "AUDIO") {
    result.controls = true;
    return result;
  }
  const el = document.createElement("audio");
  el.controls = true;
  el.src = result && result.src ? result.src : result;
  return el;
}

function renderScene(index, scene, imgEl, audioEl) {
  const container = document.getElementById("scenes");
  const card = document.createElement("div");
  card.className = "scene-card";

  const label = document.createElement("div");
  label.className = "scene-label";
  label.textContent = "Scene " + (index + 1);
  card.appendChild(label);

  imgEl.alt = "Scene " + (index + 1) + " visual";
  card.appendChild(imgEl);

  const text = document.createElement("p");
  text.className = "scene-text";
  text.textContent = scene.narration;
  card.appendChild(text);

  card.appendChild(audioEl);
  container.appendChild(card);
}

async function handleGenerate() {
  const topic = document.getElementById("topic").value.trim();
  const generateBtn = document.getElementById("generateBtn");
  if (!topic) {
    alert("Type a topic or tap Surprise me.");
    return;
  }

  document.getElementById("scenes").innerHTML = "";
  document.getElementById("log").innerHTML = "";
  document.getElementById("videoTitle").textContent = "";
  document.getElementById("videoTags").textContent = "";
  generateBtn.disabled = true;

  try {
    setStatus("Writing script...");
    log("If Puter asks you to sign in, that's expected, it's free.");
    const script = await generateScript(topic);
    log("Script ready: " + script.title);
    document.getElementById("videoTitle").textContent = script.title;
    document.getElementById("videoTags").textContent = script.tags.join(", ");

    for (let i = 0; i < script.scenes.length; i++) {
      const scene = script.scenes[i];

      setStatus(
        "Generating image " + (i + 1) + " of " + script.scenes.length + "..."
      );
      log("Scene " + (i + 1) + ": generating image...");
      const imgEl = await puter.ai.txt2img(scene.image_prompt, {
        model: "gpt-image-1",
      });

      setStatus(
        "Generating voiceover " + (i + 1) + " of " + script.scenes.length + "..."
      );
      log("Scene " + (i + 1) + ": generating voiceover...");
      const audioResult = await puter.ai.txt2speech(scene.narration, {
        provider: "openai",
      });
      const audioEl = toAudioElement(audioResult);

      renderScene(i, scene, imgEl, audioEl);
    }

    setStatus("Done. Save each image and voiceover, then assemble in CapCut.");
    log("All 4 scenes generated.");
  } catch (err) {
    setStatus(
      "Something failed: " + describeError(err)
    );
    log("ERROR: " + describeError(err));
  } finally {
    generateBtn.disabled = false;
  }
}

async function copyDebugInfo() {
  const status = document.getElementById("status").textContent;
  const logLines = Array.from(document.querySelectorAll(".log-line")).map(
    (l) => l.textContent
  );
  const title = document.getElementById("videoTitle").textContent;
  const tags = document.getElementById("videoTags").textContent;
  const report = [
    "Status: " + status,
    "Title: " + title,
    "Tags: " + tags,
    "Log:",
    ...logLines,
  ].join("\n");

  const btn = document.getElementById("copyLogBtn");
  const original = btn.textContent;
  try {
    await navigator.clipboard.writeText(report);
    btn.textContent = "Copied!";
  } catch (err) {
    alert(
      "Couldn't copy automatically, long-press the log text above and copy manually."
    );
  }
  setTimeout(() => {
    btn.textContent = original;
  }, 1500);
}

document.getElementById("surpriseBtn").addEventListener("click", pickSeedTopic);
document.getElementById("generateBtn").addEventListener("click", handleGenerate);
document.getElementById("copyLogBtn").addEventListener("click", copyDebugInfo);
</script>
</body>
</html>
